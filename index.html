<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reiyh IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>
body{
  margin:0;
  background:#111;
  font-family:Arial;
  color:white;
}

header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#000;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:15px;
  padding:15px;
}

.channel{
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.2s;
}

.channel:hover{
  transform:scale(1.05);
}

.channel img{
  width:100%;
  height:100px;
  object-fit:contain;
  background:#000;
}

.channel-name{
  text-align:center;
  padding:5px;
  font-size:12px;
}

#overlay{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

video{
  width:100%;
  height:100%;
  background:black;
}

.closeBtn{
  position:absolute;
  top:20px;
  right:20px;
  background:red;
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<header>📺 Reiyh IPTV</header>

<div class="grid" id="playlist"></div>

<div id="overlay">
  <button class="closeBtn" onclick="closePlayer()">X</button>
  <video id="videoPlayer" controls autoplay></video>
</div>

<script>

const playlistURL = "https://raw.githubusercontent.com/reiyhbit/iptv/main/v"; // palitan kung needed

let hlsInstance = null;
let shakaInstance = null;

async function loadPlaylist(){
  try{
    const response = await fetch(playlistURL + "?t=" + Date.now());
    const text = await response.text();
    parseM3U(text);
  }catch(err){
    alert("Failed to load playlist.");
    console.error(err);
  }
}

function parseM3U(data){
  const lines = data.split("\n");
  const container = document.getElementById("playlist");
  container.innerHTML = "";

  for(let i=0;i<lines.length;i++){
    if(lines[i].startsWith("#EXTINF")){
      const info = lines[i];
      const url = lines[i+1];

      const nameMatch = info.match(/,(.*)/);
      const logoMatch = info.match(/tvg-logo="(.*?)"/);

      const name = nameMatch ? nameMatch[1].trim() : "No Name";
      const logo = logoMatch ? logoMatch[1] : "https://via.placeholder.com/150?text=No+Logo";

      const div = document.createElement("div");
      div.className = "channel";
      div.onclick = () => playChannel(url,name);

      div.innerHTML = `
        <img src="${logo}" onerror="this.src='https://via.placeholder.com/150?text=No+Logo'">
        <div class="channel-name">${name}</div>
      `;

      container.appendChild(div);
    }
  }
}

function playChannel(url,name){

  let video = document.getElementById("videoPlayer");
  document.getElementById("overlay").style.display="flex";

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance=null;
  }

  if(shakaInstance){
    shakaInstance.destroy();
    shakaInstance=null;
  }

  video.pause();
  video.removeAttribute("src");
  video.load();

  if(url.includes(".m3u8")){
    if(Hls.isSupported()){
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
    }else{
      video.src = url;
    }
  }
  else if(url.includes(".mpd")){
    shakaInstance = new shaka.Player(video);
    shakaInstance.load(url).catch(e=>console.log(e));
  }
  else{
    video.src = url;
  }

  video.play().catch(()=>{});
  video.requestFullscreen().catch(()=>{});
}

function closePlayer(){
  let video = document.getElementById("videoPlayer");

  if(hlsInstance){
    hlsInstance.destroy();
    hlsInstance=null;
  }

  if(shakaInstance){
    shakaInstance.destroy();
    shakaInstance=null;
  }

  video.pause();
  video.removeAttribute("src");
  video.load();

  document.getElementById("overlay").style.display="none";
}

loadPlaylist();

</script>
</body>
</html>
