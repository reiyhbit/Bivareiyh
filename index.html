<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upgraded IPTV Web App</title>

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial, sans-serif;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#141414;
}
.logo { font-size:20px; font-weight:bold; }
.search-box input {
  padding:7px;
  border-radius:5px;
  border:none;
  width:200px;
}

/* CATEGORY BAR */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  background:#1c1c1c;
}
.category {
  padding:6px 15px;
  margin-right:8px;
  background:#333;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}
.category.active { background:#e50914; }

/* SLIDER */
.slider {
  height:250px;
  position:relative;
  overflow:hidden;
}
.slide {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:1s;
}
.slide.active { opacity:1; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:20px;
}
.card {
  background:#1c1c1c;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  position:relative;
}
.card:hover { transform:scale(1.08); }
.card img {
  width:100%;
  height:130px;
  object-fit:contain;
  background:black;
}
.card-title {
  padding:6px;
  font-size:13px;
  text-align:center;
}
.fav {
  position:absolute;
  top:5px;
  right:5px;
  font-size:18px;
  cursor:pointer;
}

/* PLAYER OVERLAY */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:999;
}

/* VIDEO */
video {
  width:90%;
  max-width:1100px;
}

/* CLOSE BUTTON */
.close-btn {
  margin-top:10px;
  padding:8px 15px;
  background:red;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* LOADER */
.loader {
  position:absolute;
  width:60px;
  height:60px;
  border:6px solid #444;
  border-top:6px solid #e50914;
  border-radius:50%;
  animation:spin 1s linear infinite;
  display:none;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* QUALITY SELECT */
.quality-select {
  position:absolute;
  bottom:70px;
  right:20px;
  background:#111;
  padding:5px;
  border-radius:5px;
  display:none;
}
.quality-select select {
  background:#222;
  color:white;
  border:none;
  padding:5px;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">BivaReiyh</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search channel...">
  </div>
</div>

<div class="categories" id="categories"></div>
<div class="slider" id="slider"></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="loader" id="loader"></div>
  <video id="videoPlayer" controls autoplay></video>
  <div class="quality-select" id="qualityBox">
    <select id="qualitySelect"></select>
  </div>
  <button class="close-btn" onclick="closePlayer()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.4.0/shaka-player.compiled.js"></script>

<script>
let channels=[];
let currentCategory="All";
let favorites=JSON.parse(localStorage.getItem("favorites"))||[];
let hlsInstance = null;
let shakaInstance = null;
let currentUrl = "";

const video = document.getElementById("videoPlayer");
const loader = document.getElementById("loader");
const qualityBox = document.getElementById("qualityBox");
const qualitySelect = document.getElementById("qualitySelect");

(async function(){
const url="https://raw.githubusercontent.com/reiyhbit/iptv/refs/heads/main/viva.m3u";
const text=await fetch(url).then(r=>r.text());
const lines=text.split("\n");

for(let i=0;i<lines.length;i++){
 if(lines[i].startsWith("#EXTINF")){
  let name=lines[i].split(",")[1]||"Unknown";
  let logoMatch=lines[i].match(/tvg-logo="([^"]+)"/);
  let groupMatch=lines[i].match(/group-title="([^"]+)"/);
  let logo=logoMatch?logoMatch[1]:"https://via.placeholder.com/150x120";
  let group=groupMatch?groupMatch[1]:"Others";
  let stream=lines[i+1]||"";
  channels.push({name,logo,group,stream});
 }
}

buildCategories();
buildSlider();
renderGrid();
})();

/* CATEGORY */
function buildCategories(){
let cats=["All","Favorites",...new Set(channels.map(c=>c.group))];
let container=document.getElementById("categories");
cats.forEach(cat=>{
 let div=document.createElement("div");
 div.className="category";
 div.textContent=cat;
 if(cat==="All") div.classList.add("active");
 div.onclick=()=>{
  document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));
  div.classList.add("active");
  currentCategory=cat;
  renderGrid();
 };
 container.appendChild(div);
});
}

/* SLIDER */
function buildSlider(){
let slider=document.getElementById("slider");
channels.slice(0,5).forEach((c,i)=>{
 let slide=document.createElement("div");
 slide.className="slide";
 slide.style.backgroundImage=`url('${c.logo}')`;
 if(i===0) slide.classList.add("active");
 slider.appendChild(slide);
});
let index=0;
setInterval(()=>{
 let slides=document.querySelectorAll(".slide");
 slides[index].classList.remove("active");
 index=(index+1)%slides.length;
 slides[index].classList.add("active");
},4000);
}

/* GRID */
function renderGrid(){
let grid=document.getElementById("grid");
grid.innerHTML="";
let search=document.getElementById("searchInput").value.toLowerCase();

channels
.filter(c=>{
 if(currentCategory==="Favorites") return favorites.includes(c.name);
 if(currentCategory==="All") return true;
 return c.group===currentCategory;
})
.filter(c=>c.name.toLowerCase().includes(search))
.forEach(c=>{
 let card=document.createElement("div");
 card.className="card";
 card.innerHTML=`
  <div class="fav">${favorites.includes(c.name)?"⭐":"☆"}</div>
  <img src="${c.logo}">
  <div class="card-title">${c.name}</div>
 `;
 card.querySelector(".fav").onclick=(e)=>{
  e.stopPropagation();
  toggleFavorite(c.name);
 };
 card.onclick=()=>playChannel(c.stream,c.name);
 grid.appendChild(card);
});
}

/* SEARCH */
document.getElementById("searchInput").oninput=renderGrid;

/* FAVORITES */
function toggleFavorite(name){
 if(favorites.includes(name)){
  favorites=favorites.filter(f=>f!==name);
 } else favorites.push(name);
 localStorage.setItem("favorites",JSON.stringify(favorites));
 renderGrid();
}

/* PLAYER HELPERS */
function showLoader(show){ loader.style.display = show ? "block" : "none"; }

function destroyPlayers(){
  if(hlsInstance){ hlsInstance.destroy(); hlsInstance=null; }
  if(shakaInstance){ shakaInstance.destroy(); shakaInstance=null; }
  qualityBox.style.display="none";
}

/* PLAY CHANNEL */
function playChannel(url,name){
  currentUrl = url;
  localStorage.setItem("lastWatched", name);
  document.getElementById("overlay").style.display="flex";
  video.controls = true;
  showLoader(true);

  destroyPlayers();
  video.pause();
  video.removeAttribute("src");
  video.load();

  if(url.includes(".mp4")){
    video.src = url;
    video.play();
    showLoader(false);

  } else if(url.includes(".m3u8")){
    if(Hls.isSupported()){
      hlsInstance = new Hls({ enableWorker:true });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);

      hlsInstance.on(Hls.Events.MANIFEST_PARSED, function(){
        buildHlsQualityMenu();
        showLoader(false);
      });

    } else if(video.canPlayType("application/vnd.apple.mpegurl")){
      video.src = url;
      showLoader(false);
    }

  } else if(url.includes(".mpd")){
    shakaInstance = new shaka.Player(video);
    shakaInstance.load(url).then(()=>{
      buildShakaQualityMenu();
      showLoader(false);
    }).catch(e=>console.error(e));
  }

  video.requestFullscreen().catch(()=>{});
}

/* HLS QUALITY MENU */
function buildHlsQualityMenu(){
  qualityBox.style.display="block";
  qualitySelect.innerHTML="";
  hlsInstance.levels.forEach((level,i)=>{
    let option=document.createElement("option");
    option.value=i;
    option.text=`${level.height}p`;
    qualitySelect.appendChild(option);
  });
  qualitySelect.onchange=function(){ hlsInstance.currentLevel=this.value; }
}

/* SHAKA QUALITY MENU */
function buildShakaQualityMenu(){
  qualityBox.style.display="block";
  qualitySelect.innerHTML="";
  let tracks=shakaInstance.getVariantTracks();
  tracks.forEach(track=>{
    if(track.height){
      let option=document.createElement("option");
      option.value=track.id;
      option.text=`${track.height}p`;
      qualitySelect.appendChild(option);
    }
  });
  qualitySelect.onchange=function(){
    shakaInstance.selectVariantTrack(
      tracks.find(t=>t.id==this.value), true
    );
  };
}

/* RESUME PLAYBACK */
video.addEventListener("timeupdate", ()=>{
  if(currentUrl) localStorage.setItem("resume_"+currentUrl, video.currentTime);
});
video.addEventListener("loadedmetadata", ()=>{
  let resumeTime = localStorage.getItem("resume_"+currentUrl);
  if(resumeTime) video.currentTime = resumeTime;
});

/* CLOSE PLAYER */
function closePlayer(){
  destroyPlayers();
  video.pause();
  video.removeAttribute("src");
  video.load();
  document.getElementById("overlay").style.display="none";
}
</script>

</body>
</html>
